<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mr. Tomato Kiosco - Sistema Profesional</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #F5F5F5; }
.hidden { display: none !important; }

#loginScreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #E53935 0%, #C62828 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 99999;
    padding: 1rem;
}

.login-box {
    background: white;
    padding: 2rem;
    border-radius: 20px;
    max-width: 450px;
    width: 100%;
}

.btn {
    padding: 0.8rem 1.2rem;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
}
.btn:hover { transform: translateY(-2px); }
.btn-primary { background: #E53935; color: white; }
.btn-success { background: #43A047; color: white; }
.btn-secondary { background: #9E9E9E; color: white; }
.btn-warning { background: #FF9800; color: white; }
.btn-danger { background: #D32F2F; color: white; }

input, select {
    width: 100%;
    padding: 0.8rem;
    border: 2px solid #E0E0E0;
    border-radius: 8px;
    font-size: 0.9rem;
}
input:focus, select:focus { outline: none; border-color: #E53935; }

.header {
    background: linear-gradient(135deg, #E53935 0%, #C62828 100%);
    color: white;
    padding: 0.8rem 1rem;
}
.header-content {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.5rem;
}

.tabs {
    background: white;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    position: sticky;
    top: 0;
    z-index: 100;
}
.tabs-container {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    gap: 0.2rem;
    padding: 0 0.5rem;
    flex-wrap: wrap;
}
.tab {
    padding: 0.7rem 1rem;
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    color: #9E9E9E;
}
.tab.active {
    color: #E53935;
    border-bottom-color: #E53935;
    background: #F5F5F5;
}

.container { max-width: 1400px; margin: 0 auto; padding: 1rem; }
.page { display: none; }
.page.active { display: block; }

.card {
    background: white;
    padding: 1rem;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    margin-bottom: 1rem;
}

.producto-card, .cart-item {
    background: #F5F5F5;
    padding: 0.8rem;
    border-radius: 10px;
    margin-bottom: 0.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.5rem;
    cursor: pointer;
}
.producto-card:hover { background: #EEEEEE; }

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 100000;
    align-items: center;
    justify-content: center;
}
.modal.active { display: flex; }
.modal-content {
    background: white;
    padding: 1.5rem;
    border-radius: 15px;
    max-width: 550px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
}

.success-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(67, 160, 71, 0.95);
    z-index: 200000;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
}
.success-overlay.active { display: flex; }

.badge {
    display: inline-block;
    padding: 0.2rem 0.5rem;
    border-radius: 10px;
    font-size: 0.7rem;
    font-weight: 600;
    margin-left: 0.3rem;
}
.badge-peso { background: #FFF3E0; color: #E65100; }
.badge-unidad { background: #E3F2FD; color: #1565C0; }

.dashboard-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 1rem;
}
.stat-card {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 1rem;
    border-radius: 12px;
    text-align: center;
}
.stat-card.success { background: linear-gradient(135deg, #43A047, #2E7D32); }
.stat-card.warning { background: linear-gradient(135deg, #FF9800, #F57C00); }
.stat-card.danger { background: linear-gradient(135deg, #E53935, #C62828); }

.alert-stock {
    background: #FFEBEE;
    border-left: 4px solid #E53935;
    padding: 0.5rem;
    margin: 0.5rem 0;
    font-size: 0.8rem;
}

@media print { .no-print { display: none; } body { background: white; } }
@media (max-width: 768px) {
    .producto-card, .cart-item { flex-direction: column; text-align: center; }
    .tab { padding: 0.5rem; font-size: 0.75rem; }
    .dashboard-stats { grid-template-columns: 1fr; }

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>let productos = [];
let ventas = [];
let cierres = [];
let proveedores = [];
let preciosMayoristas = [];
let clientesFiado = [];
let cajaActual = null;
let carrito = [];
let fechaTrabajo = '';
let usuarioActual = '';
let chartVentas = null;
let ticketAutomatico = false;

function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

function cargarDatosLocales() {
    productos = JSON.parse(localStorage.getItem('productos_kiosco')) || [
        { id: '1', nombre: 'Coca Cola 2.25L', precio: 2500, costo: 1800, stock: 12, tipo: 'unidad' },
        { id: '2', nombre: 'Jamón Cocido', precio: 8500, costo: 6200, stock: 3.5, tipo: 'peso' },
        { id: '3', nombre: 'Alimento Dog Chow', precio: 3000, costo: 2100, stock: 20, tipo: 'peso' }
    ];
    ventas = JSON.parse(localStorage.getItem('ventas_kiosco')) || [];
    cierres = JSON.parse(localStorage.getItem('cierres_kiosco')) || [];
    proveedores = JSON.parse(localStorage.getItem('proveedores_kiosco')) || [];
    preciosMayoristas = JSON.parse(localStorage.getItem('precios_mayoristas')) || [];
    clientesFiado = JSON.parse(localStorage.getItem('clientes_fiado')) || [];
    cajaActual = JSON.parse(localStorage.getItem('caja_kiosco')) || null;
    ticketAutomatico = localStorage.getItem('ticket_automatico') === 'true';
}

function guardarDatosLocales() {
    localStorage.setItem('productos_kiosco', JSON.stringify(productos));
    localStorage.setItem('ventas_kiosco', JSON.stringify(ventas));
    localStorage.setItem('cierres_kiosco', JSON.stringify(cierres));
    localStorage.setItem('proveedores_kiosco', JSON.stringify(proveedores));
    localStorage.setItem('precios_mayoristas', JSON.stringify(preciosMayoristas));
    localStorage.setItem('clientes_fiado', JSON.stringify(clientesFiado));
    localStorage.setItem('caja_kiosco', JSON.stringify(cajaActual));
    localStorage.setItem('ticket_automatico', ticketAutomatico);
}

function exportarDatos() {
    const datos = { productos, ventas, cierres, proveedores, preciosMayoristas, clientesFiado, cajaActual };
    const blob = new Blob([JSON.stringify(datos, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `backup_${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
    alert('✅ Backup exportado');
}

function login() {
    const user = document.getElementById('loginUserSelect').value;
    const pass = document.getElementById('loginPass').value;
    fechaTrabajo = document.getElementById('inputFecha').value;
    if (!fechaTrabajo) { alert('⚠️ Seleccione fecha'); return; }
    const usuarios = { admin: '1910', cajero1: '1234', cajero2: '1234' };
    if (usuarios[user] === pass) {
        usuarioActual = user;
        cargarDatosLocales();
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('sistemaScreen').classList.remove('hidden');
        const fecha = new Date(fechaTrabajo + 'T00:00:00');
        document.getElementById('headerFecha').textContent = fecha.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        document.getElementById('headerUsuario').textContent = `👤 ${user === 'admin' ? 'Admin' : user === 'cajero1' ? 'Cajero 1' : 'Cajero 2'}`;
        renderProductosVenta();
        renderListaProductos();
        renderListaProveedores();
        renderListaClientesFiado();
        cargarFiltrosMes();
        actualizarDashboard();
        verificarStockBajo();
        if (typeof renderListaPreciosMayoristas === 'function') renderListaPreciosMayoristas();
    } else {
        alert('❌ Usuario o contraseña incorrectos\nadmin/1910 | cajero1/1234 | cajero2/1234');
        document.getElementById('loginPass').value = '';
    }
}

function cerrarSesion() {
    if (confirm('¿Cerrar sesión?')) {
        carrito = [];
        document.getElementById('sistemaScreen').classList.add('hidden');
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('loginPass').value = '';
        document.getElementById('inputFecha').value = new Date().toISOString().split('T')[0];
    }
}

function verHistorialCierres() {
    if (!cierres.length) { alert('📋 No hay cierres'); return; }
    let msg = '📋 CIERRES\n\n';
    cierres.slice().reverse().forEach(c => {
        msg += `${new Date(c.fecha+'T00:00:00').toLocaleDateString('es-AR')}\nVentas: ${c.ventas} | Total: $${c.total.toFixed(2)}\n\n`;
    });
    alert(msg);
}

function switchTab(page, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(page).classList.add('active');
    if (page === 'productos') renderListaProductos();
    if (page === 'historial') renderHistorialVentas();
    if (page === 'proveedores') renderListaProveedores();
    if (page === 'fiados') renderListaClientesFiado();
}

function actualizarDashboard() {
    const ventasHoy = ventas.filter(v => v.fechaTrabajo === fechaTrabajo && v.usuario === usuarioActual);
    const totalHoy = ventasHoy.reduce((s, v) => s + (v.total || 0), 0);
    const gananciaHoy = ventasHoy.reduce((s, v) => s + (v.gananciaTotal || 0), 0);
    const ventasMes = ventas.filter(v => { const f = new Date(v.fecha); const a = new Date(); return f.getMonth() === a.getMonth() && f.getFullYear() === a.getFullYear(); });
    const totalMes = ventasMes.reduce((s, v) => s + (v.total || 0), 0);
    document.getElementById('dashboardStats').innerHTML = `
        <div class="stat-card success"><div style="font-size:2rem;">$${totalHoy.toFixed(2)}</div><div>Ventas hoy</div></div>
        <div class="stat-card"><div style="font-size:2rem;">$${gananciaHoy.toFixed(2)}</div><div>Ganancia hoy</div></div>
        <div class="stat-card warning"><div style="font-size:2rem;">$${totalMes.toFixed(2)}</div><div>Ventas del mes</div></div>
        <div class="stat-card danger"><div style="font-size:2rem;">${cajaActual ? `$${(cajaActual.montoActual || 0).toFixed(2)}` : 'Caja cerrada'}</div><div>Efectivo</div></div>`;
    const ultimos7 = [];
    for (let i = 6; i >= 0; i--) {
        const fecha = new Date(); fecha.setDate(fecha.getDate() - i);
        const total = ventas.filter(v => v.fechaTrabajo === fecha.toISOString().split('T')[0]).reduce((s, v) => s + (v.total || 0), 0);
        ultimos7.push({ fecha: fecha.toLocaleDateString('es-AR', { weekday: 'short' }), total });
    }
    if (chartVentas) chartVentas.destroy();
    const ctx = document.getElementById('ventasChart').getContext('2d');
    chartVentas = new Chart(ctx, { type: 'bar', data: { labels: ultimos7.map(d => d.fecha), datasets: [{ label: 'Ventas', data: ultimos7.map(d => d.total), backgroundColor: '#E53935' }] }, options: { responsive: true } });
}

function verificarStockBajo() {
    const bajos = productos.filter(p => p.stock < 5 && p.stock > 0);
    const agotados = productos.filter(p => p.stock <= 0);
    let html = '';
    if (bajos.length) { html += `<div class="alert-stock">⚠️ STOCK BAJO:<br>`; bajos.forEach(p => { html += `• ${p.nombre}: ${p.stock.toFixed(2)} ${p.tipo === 'peso' ? 'kg' : 'und'}<br>`; }); html += `</div>`; }
    if (agotados.length) { html += `<div class="alert-stock" style="border-left-color:#FF9800;">❌ SIN STOCK:<br>`; agotados.forEach(p => { html += `• ${p.nombre}<br>`; }); html += `</div>`; }
    if (!bajos.length && !agotados.length) { html = '<p style="color:#43A047;">✅ Stock OK</p>'; }
    document.getElementById('alertasStock').innerHTML = html;
}

function renderListaProductos() {
    if (!productos.length) {
        document.getElementById('listaProductos').innerHTML = '<p style="text-align:center;color:#999;padding:2rem;">📦 No hay productos</p>';
        return;
    }
    document.getElementById('listaProductos').innerHTML = productos.map(p => {
        let ganancia = (p.precio - (p.costo || 0)).toFixed(2);
        let margen = p.costo ? ((p.precio - p.costo) / p.costo * 100).toFixed(1) : 0;
        return `<div class="producto-card"><div><strong>${escapeHtml(p.nombre)}</strong><span class="badge ${p.tipo === 'peso' ? 'badge-peso' : 'badge-unidad'}">${p.tipo === 'peso' ? 'KG' : 'UND'}</span><br><small>Venta: $${p.precio.toFixed(2)}${p.tipo === 'peso' ? '/kg' : ''} | Costo: $${(p.costo || 0).toFixed(2)} | Ganancia: $${ganancia} (${margen}%)</small><br><small>Stock: ${p.stock.toFixed(2)}</small></div><div style="display:flex; gap:0.3rem;"><button class="btn btn-warning" onclick="editarProducto('${p.id}')" style="padding:0.3rem 0.8rem;">✏️</button><button class="btn btn-danger" onclick="eliminarProducto('${p.id}')" style="padding:0.3rem 0.8rem;">🗑️</button></div></div>`;
    }).join('');
}

function editarProducto(id) {
    const p = productos.find(x => x.id === id);
    if (!p) { alert('❌ Producto no encontrado'); return; }
    document.getElementById('modalProductoTitulo').textContent = '✏️ Editar';
    document.getElementById('productoIdEdit').value = p.id;
    document.getElementById('inputNombre').value = p.nombre;
    document.getElementById('inputTipo').value = p.tipo;
    document.getElementById('inputStock').value = p.stock;
    if (p.tipo === 'peso') {
        document.getElementById('precioUnidadDiv').style.display = 'none';
        document.getElementById('precioKiloDiv').style.display = 'block';
        document.getElementById('inputPrecioKilo').value = p.precio;
    } else {
        document.getElementById('precioUnidadDiv').style.display = 'block';
        document.getElementById('precioKiloDiv').style.display = 'none';
        document.getElementById('inputPrecio').value = p.precio;
    }
    document.getElementById('costoDiv').style.display = 'block';
    document.getElementById('inputCosto').value = p.costo || 0;
    document.getElementById('modalProducto').classList.add('active');
}

function guardarProducto() {
    const id = document.getElementById('productoIdEdit').value;
    const nombre = document.getElementById('inputNombre').value.trim();
    const tipo = document.getElementById('inputTipo').value;
    let precio = tipo === 'peso' ? parseFloat(document.getElementById('inputPrecioKilo').value) : parseFloat(document.getElementById('inputPrecio').value);
    const stock = parseFloat(document.getElementById('inputStock').value);
    const costo = parseFloat(document.getElementById('inputCosto').value) || 0;
    if (!nombre) { alert('❌ Ingrese nombre'); return; }
    if (isNaN(precio) || precio <= 0) { alert('❌ Precio inválido'); return; }
    if (isNaN(stock) || stock < 0) { alert('❌ Stock inválido'); return; }
    if (id) {
        const idx = productos.findIndex(p => p.id === id);
        if (idx !== -1) productos[idx] = { ...productos[idx], nombre, precio, stock, tipo, costo };
    } else {
        productos.push({ id: Date.now().toString(), nombre, precio, costo, stock, tipo });
    }
    guardarDatosLocales();
    renderListaProductos();
    renderProductosVenta();
    verificarStockBajo();
    cerrarModalProducto();
    limpiarFormularioProducto();
    alert('✅ Producto guardado');
}

function limpiarFormularioProducto() {
    document.getElementById('modalProductoTitulo').textContent = '➕ Agregar';
    document.getElementById('productoIdEdit').value = '';
    document.getElementById('inputNombre').value = '';
    document.getElementById('inputPrecio').value = '';
    document.getElementById('inputPrecioKilo').value = '';
    document.getElementById('inputStock').value = '';
    document.getElementById('inputCosto').value = '';
    document.getElementById('costoDiv').style.display = 'none';
    document.getElementById('precioUnidadDiv').style.display = 'block';
    document.getElementById('precioKiloDiv').style.display = 'none';
}

function eliminarProducto(id) {
    if (!confirm('¿Eliminar?')) return;
    productos = productos.filter(p => p.id !== id);
    preciosMayoristas = preciosMayoristas.filter(pm => pm.productoId !== id);
    guardarDatosLocales();
    renderListaProductos();
    renderProductosVenta();
    verificarStockBajo();
    if (typeof renderListaPreciosMayoristas === 'function') renderListaPreciosMayoristas();
    alert('✅ Producto eliminado');
}

function togglePrecioKilo() {
    const tipo = document.getElementById('inputTipo').value;
    document.getElementById('precioUnidadDiv').style.display = tipo === 'peso' ? 'none' : 'block';
    document.getElementById('precioKiloDiv').style.display = tipo === 'peso' ? 'block' : 'none';
}

function abrirModalProducto() { limpiarFormularioProducto(); document.getElementById('modalProducto').classList.add('active'); }
function cerrarModalProducto() { document.getElementById('modalProducto').classList.remove('active'); limpiarFormularioProducto(); }

function abrirModalCosto() {
    if (!productos.length) { alert('📦 No hay productos'); return; }
    document.getElementById('listaCostosProductos').innerHTML = productos.map(p => `<div style="margin-bottom:1rem; padding:0.8rem; background:#F5F5F5; border-radius:8px;"><strong>${escapeHtml(p.nombre)}</strong><br><small>Venta: $${p.precio.toFixed(2)}${p.tipo === 'peso' ? '/kg' : ''}</small><input type="number" id="costo_${p.id}" value="${p.costo || 0}" step="0.01" placeholder="Costo" style="width:100%; margin-top:0.5rem;"></div>`).join('');
    document.getElementById('modalCosto').classList.add('active');
}

function guardarCostos() {
    let actualizados = 0;
    productos.forEach(p => {
        const input = document.getElementById(`costo_${p.id}`);
        if (input) { const nuevo = parseFloat(input.value); if (!isNaN(nuevo) && nuevo >= 0) { p.costo = nuevo; actualizados++; } }
    });
    guardarDatosLocales();
    renderListaProductos();
    cerrarModalCosto();
    alert(`✅ ${actualizados} productos actualizados`);
}

function cerrarModalCosto() { document.getElementById('modalCosto').classList.remove('active'); }        function renderProductosVenta() {
            const search = (document.getElementById('searchVenta').value || '').toLowerCase();
            const filtrados = productos.filter(p => p.stock > 0 && p.nombre.toLowerCase().includes(search));
            if (!filtrados.length) { document.getElementById('productosVenta').innerHTML = '<p style="text-align:center;color:#999;padding:2rem;">📭 Sin productos</p>'; return; }
            document.getElementById('productosVenta').innerHTML = filtrados.map(p => `
                <div class="producto-card" onclick="agregarAlCarrito('${p.id}')">
                    <div><strong>${escapeHtml(p.nombre)}</strong><span class="badge ${p.tipo === 'peso' ? 'badge-peso' : 'badge-unidad'}">${p.tipo === 'peso' ? 'KG' : 'UND'}</span><br><small>$${p.precio.toFixed(2)}${p.tipo === 'peso' ? '/kg' : ''} • Stock: ${p.stock.toFixed(2)}</small></div>
                    <button class="btn btn-primary" onclick="event.stopPropagation(); agregarAlCarrito('${p.id}')">+</button>
                </div>
            `).join('');
        }

        function calcularPrecioConMayorista(producto, cantidad) {
            if (!preciosMayoristas.length) return { precio: producto.precio, esMayorista: false, descuento: 0 };
            const m = preciosMayoristas.find(pm => pm.productoId === producto.id);
            if (m && cantidad >= m.cantidadMinima) return { precio: m.precioMayorista, esMayorista: true, descuento: ((producto.precio - m.precioMayorista) / producto.precio * 100).toFixed(1) };
            return { precio: producto.precio, esMayorista: false, descuento: 0 };
        }

        function agregarAlCarrito(id) {
            const p = productos.find(x => x.id === id);
            if (!p) return;
            if (p.tipo === 'peso') {
                let kg = prompt(`${p.nombre}\n\n⚖️ KG\nStock: ${p.stock.toFixed(2)} kg\nPrecio: $${p.precio.toFixed(2)}/kg`, "1");
                if (!kg) return;
                kg = parseFloat(kg.replace(',', '.'));
                if (isNaN(kg) || kg <= 0 || kg > p.stock) { alert('❌ Cantidad inválida'); return; }
                const info = calcularPrecioConMayorista(p, kg);
                const subtotal = info.precio * kg;
                if (info.esMayorista) alert(`✨ MAYORISTA\n${p.nombre}\n${kg} kg → $${info.precio.toFixed(2)}/kg\nAhorro: ${info.descuento}%`);
                carrito.push({ ...p, cantidad: kg, subtotal, gananciaItem: (info.precio - (p.costo || 0)) * kg, precioAplicado: info.precio, esMayorista: info.esMayorista });
            } else {
                let cant = prompt(`${p.nombre}\n\n🔢 Unidades\nStock: ${p.stock}\nPrecio: $${p.precio}`, "1");
                if (!cant) return;
                cant = parseInt(cant);
                if (isNaN(cant) || cant <= 0 || cant > p.stock) { alert('❌ Cantidad inválida'); return; }
                const info = calcularPrecioConMayorista(p, cant);
                const subtotal = info.precio * cant;
                if (info.esMayorista) alert(`✨ MAYORISTA\n${p.nombre}\n${cant} und → $${info.precio.toFixed(2)} c/u\nAhorro: ${info.descuento}%`);
                carrito.push({ ...p, cantidad: cant, subtotal, gananciaItem: (info.precio - (p.costo || 0)) * cant, precioAplicado: info.precio, esMayorista: info.esMayorista });
            }
            renderCarrito();
        }

        function eliminarDelCarrito(i) { carrito.splice(i, 1); renderCarrito(); }

        function renderCarrito() {
            if (!carrito.length) {
                document.getElementById('carritoItems').innerHTML = '<p style="text-align:center;color:#999;padding:1rem;">Carrito vacío</p>';
                document.getElementById('totalCarrito').textContent = '0.00';
                return;
            }
            document.getElementById('carritoItems').innerHTML = carrito.map((item, i) => {
                const precio = item.precioAplicado !== undefined ? item.precioAplicado : item.precio;
                return `<div class="cart-item"><div><strong>${escapeHtml(item.nombre)}</strong> ${item.esMayorista ? '<span style="background:#FF9800;color:white;padding:0.2rem 0.4rem;border-radius:4px;font-size:0.6rem;">MAYORISTA</span>' : ''}<br><small>${item.cantidad.toFixed(2)} ${item.tipo === 'peso' ? 'kg' : 'und'} × $${precio.toFixed(2)} = <strong>$${item.subtotal.toFixed(2)}</strong></small></div><button class="btn btn-danger" onclick="eliminarDelCarrito(${i})" style="padding:0.3rem 0.8rem;">🗑️</button></div>`;
            }).join('');
            const total = carrito.reduce((s, i) => s + i.subtotal, 0);
            document.getElementById('totalCarrito').textContent = total.toFixed(2);
        }

        function limpiarCarrito() { if (carrito.length && confirm('¿Limpiar carrito?')) { carrito = []; renderCarrito(); document.getElementById('montoRecibido').value = ''; document.getElementById('vuelto').textContent = ''; } }

        function calcularVuelto() {
            const total = carrito.reduce((s, i) => s + i.subtotal, 0);
            const recibido = parseFloat(document.getElementById('montoRecibido').value);
            if (!isNaN(recibido) && recibido >= total) document.getElementById('vuelto').textContent = `Vuelto: $${(recibido - total).toFixed(2)}`;
            else document.getElementById('vuelto').textContent = '';
        }

        function confirmarVenta() {
            if (!carrito.length) { alert('Carrito vacío'); return; }
            const total = carrito.reduce((s, i) => s + i.subtotal, 0);
            const formaPago = document.getElementById('formaPago').value;
            
            if (formaPago === 'fiado') {
                const nombre = prompt('📒 Cliente:');
                if (!nombre) return;
                let cliente = clientesFiado.find(c => c.nombre.toLowerCase() === nombre.trim().toLowerCase());
                if (!cliente) {
                    if (!confirm(`"${nombre}" no existe. ¿Crearlo?`)) return;
                    const tel = prompt('📞 Teléfono:');
                    const dir = prompt('📍 Dirección:');
                    const lim = parseFloat(prompt('💰 Límite mensual:', '50000'));
                    if (isNaN(lim) || lim <= 0) { alert('Límite inválido'); return; }
                    cliente = { id: Date.now().toString(), nombre: nombre.trim(), telefono: tel || '', direccion: dir || '', limiteMensual: lim, deudas: [] };
                    clientesFiado.push(cliente);
                    guardarClientesFiado();
                    renderListaClientesFiado();
                    alert(`✅ Cliente ${nombre} creado`);
                }
                const deuda = cliente.deudas.reduce((s, d) => s + (d.monto - (d.pagado || 0)), 0);
                const disponible = cliente.limiteMensual - deuda;
                if (total > disponible) {
                    alert(`❌ Cliente sin crédito. Límite: $${cliente.limiteMensual.toFixed(2)} | Deuda: $${deuda.toFixed(2)} | Disponible: $${disponible.toFixed(2)}`);
                    return;
                }
                cliente.deudas.push({ id: Date.now().toString(), fecha: new Date().toISOString(), monto: total, pagado: 0, fechaVencimiento: null, pagos: [], usuario: usuarioActual, items: JSON.parse(JSON.stringify(carrito)) });
                guardarClientesFiado();
                renderListaClientesFiado();
                carrito = [];
                renderCarrito();
                renderProductosVenta();
                alert(`✅ Venta a crédito: $${total.toFixed(2)} para ${cliente.nombre}`);
                return;
            }
            
            let resumen = '<h4>Resumen:</h4>';
            carrito.forEach(i => {
                const precio = i.precioAplicado !== undefined ? i.precioAplicado : i.precio;
                resumen += `<p>${escapeHtml(i.nombre)} ${i.esMayorista ? '🏷️' : ''}: ${i.cantidad.toFixed(2)} ${i.tipo === 'peso' ? 'kg' : 'und'} × $${precio.toFixed(2)} = $${i.subtotal.toFixed(2)}</p>`;
            });
            resumen += `<hr><p>Pago: ${formaPago === 'efectivo' ? 'Efectivo' : formaPago === 'tarjeta' ? 'Tarjeta' : 'Transferencia'}</p><h3>Total: $${total.toFixed(2)}</h3>`;
            document.getElementById('resumenVenta').innerHTML = resumen;
            document.getElementById('modalConfirmacion').classList.add('active');
        }

        function procesarVenta() {
            if (!carrito.length) return;
            const total = carrito.reduce((s, i) => s + i.subtotal, 0);
            const ganancia = carrito.reduce((s, i) => s + i.gananciaItem, 0);
            const formaPago = document.getElementById('formaPago').value;
            const recibido = parseFloat(document.getElementById('montoRecibido').value);
            const vuelto = !isNaN(recibido) && recibido >= total ? recibido - total : 0;
            for (const item of carrito) { const p = productos.find(x => x.id === item.id); if (p) p.stock -= item.cantidad; }
            ventas.push({ id: Date.now(), fecha: new Date().toISOString(), fechaTrabajo, usuario: usuarioActual, formaPago, items: JSON.parse(JSON.stringify(carrito)), total, gananciaTotal: ganancia, recibido, vuelto });
            if (cajaActual && formaPago === 'efectivo') { cajaActual.montoActual = (cajaActual.montoActual || 0) + total; cajaActual.movimientos = cajaActual.movimientos || []; cajaActual.movimientos.push({ fecha: new Date().toISOString(), tipo: 'venta', monto: total }); }
            guardarDatosLocales();
            document.getElementById('successTotal').innerHTML = `Total: $${total.toFixed(2)}<br>${vuelto > 0 ? `Vuelto: $${vuelto.toFixed(2)}` : ''}`;
            document.getElementById('successOverlay').classList.add('active');
            carrito = []; renderCarrito(); renderProductosVenta(); renderListaProductos(); cargarFiltrosMes(); actualizarDashboard(); verificarStockBajo();
            document.getElementById('montoRecibido').value = '';
            if (ticketAutomatico) setTimeout(() => { if (ventas.length) imprimirTicket(ventas[ventas.length - 1]); }, 500);
            cerrarModalConfirmacion();

            const sm = document.getElementById('filtroMes');

        }

        function generarReportePDF(tipo) {

        function generarReporteGanancias() {

        function renderListaProveedores() {
